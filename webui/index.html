<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion Orchestrator Dashboard</title>
    <link rel="stylesheet" href="/ui/style.css">
</head>
<body>
    <header class="topbar">
        <h1>🧬 Fusion Orchestrator</h1>
        <div class="status-indicator">
            <span class="dot" id="healthDot"></span>
            <span id="healthText">Checking...</span>
        </div>
    </header>

    <div class="dashboard">
        <!-- Left Panel: Council Config with Model Swapper -->
        <section class="panel panel-config">
            <h2>⚙️ Council Configuration</h2>
            <div class="swap-actions-top">
                <button id="refreshModelsBtn" class="btn btn-secondary">🔄 Refresh Models</button>
                <span id="swapStatus" class="swap-status"></span>
            </div>
            <div id="normalCouncil" class="council-card">
                <h3>Normal Council</h3>
                <div class="worker-list" id="normalWorkers"></div>
                <div class="judge-info" id="normalJudge"></div>
                <div class="swap-section">
                    <div class="swap-row">
                        <label>Worker 1:</label>
                        <select id="swapNormalWorker0" class="model-select"></select>
                    </div>
                    <div class="swap-row">
                        <label>Worker 2:</label>
                        <select id="swapNormalWorker1" class="model-select"></select>
                    </div>
                    <div class="swap-row">
                        <label>Worker 3:</label>
                        <select id="swapNormalWorker2" class="model-select"></select>
                    </div>
                    <div class="swap-row">
                        <label>Judge:</label>
                        <select id="swapNormalJudge" class="model-select"></select>
                        <label class="thinking-label">
                            <input type="checkbox" id="swapNormalJudgeThinking"> Thinking
                        </label>
                    </div>
                </div>
            </div>
            <div id="advancedCouncil" class="council-card">
                <h3>Advanced Council</h3>
                <div class="worker-list" id="advancedWorkers"></div>
                <div class="judge-info" id="advancedJudge"></div>
                <div class="swap-section">
                    <div class="swap-row">
                        <label>Worker 1:</label>
                        <select id="swapAdvancedWorker0" class="model-select"></select>
                    </div>
                    <div class="swap-row">
                        <label>Worker 2:</label>
                        <select id="swapAdvancedWorker1" class="model-select"></select>
                    </div>
                    <div class="swap-row">
                        <label>Worker 3:</label>
                        <select id="swapAdvancedWorker2" class="model-select"></select>
                    </div>
                    <div class="swap-row">
                        <label>Judge:</label>
                        <select id="swapAdvancedJudge" class="model-select"></select>
                        <label class="thinking-label">
                            <input type="checkbox" id="swapAdvancedJudgeThinking"> Thinking
                        </label>
                    </div>
                </div>
            </div>
            <div class="swap-actions">
                <button id="applySwapBtn" class="btn btn-primary">✓ Apply Changes</button>
                <button id="resetSwapBtn" class="btn btn-danger">↻ Reset to Defaults</button>
            </div>
        </section>

        <!-- Center Panel: Test Query -->
        <section class="panel panel-query">
            <h2>📝 Test Query</h2>
            <div class="query-form">
                <select id="councilSelect">
                    <option value="normal">Normal Council</option>
                    <option value="advanced">Advanced Council</option>
                </select>
                <input type="text" id="messageInput" placeholder="Type your message..." />
                <button id="sendBtn">Send</button>
            </div>
            <div class="response-area" id="responseArea">
                <p class="placeholder">Response will appear here...</p>
            </div>
        </section>

        <!-- Right Panel: Info -->
        <section class="panel panel-info">
            <h2>📊 System Info</h2>
            <div id="systemInfo">
                <div class="info-row"><span class="label">Uptime:</span><span id="uptime">--</span></div>
                <div class="info-row"><span class="label">Active Routes:</span><span id="routes">--</span></div>
                <div class="info-row"><span class="label">Server Time:</span><span id="serverTime">--</span></div>
            </div>
        </section>
    </div>

    <script src="/ui/app.js"></script>
</body>
</html>
